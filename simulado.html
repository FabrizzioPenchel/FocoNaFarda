<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulado PMMG - Teste Seus Conhecimentos</title>
    <meta name="description" content="Simulados interativos para PMMG. Teste seus conhecimentos e acompanhe seu desempenho.">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: { 800: '#161d2f', 900: '#0b0f1a' },
                        neon: { green: '#4ade80', green_light: '#22c55e' }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        * { font-family: 'Inter', system-ui, sans-serif; }
        body { background-color: #0b0f1a; color: white; background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><polygon points="50,0 0,100 100,100" fill="rgba(255, 255, 255, 0.015)"/></svg>'); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #161d2f; }
        ::-webkit-scrollbar-thumb { background: #4ade80; border-radius: 4px; }
        
        .pergunta { margin-bottom: 2rem; }
        .pergunta h3 { font-size: 1.25rem; font-weight: bold; color: white; margin-bottom: 1.5rem; }
        
        .opcoes { display: flex; flex-direction: column; gap: 0.75rem; }
        
        .opcao-btn {
            text-align: left;
            padding: 1rem;
            border-radius: 0.5rem;
            border: 2px solid #334155;
            background: transparent;
            color: #cbd5e1;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1rem;
        }
        
        .opcao-btn:hover {
            border-color: #4ade80;
            color: #4ade80;
            transform: translateX(5px);
        }
        
        .opcao-btn:disabled {
            cursor: not-allowed;
        }
        
        .opcao-btn.correta {
            background: rgba(74, 222, 128, 0.15);
            border-color: #4ade80;
            color: #4ade80;
        }
        
        .opcao-btn.errada {
            background: rgba(239, 68, 68, 0.15);
            border-color: #ef4444;
            color: #ef4444;
        }

        #feedback {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 0.5rem;
            min-height: 1.5rem;
        }

        #feedback span {
            font-weight: bold;
        }

        #btnProxima {
            margin-top: 2rem;
            padding: 0.75rem 1.5rem;
            background: #4ade80;
            color: #0b0f1a;
            border: none;
            border-radius: 0.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        #btnProxima:hover {
            background: #22c55e;
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="sticky top-0 z-40 bg-dark-800 bg-opacity-95 backdrop-blur-lg border-b border-white border-opacity-10 py-5">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center">
                <a href="index.html" class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-neon-green rounded-lg flex items-center justify-center font-bold text-dark-900">📚</div>
                    <h1 class="hidden sm:block text-xl font-bold text-white">ROTA <span class="text-neon-green">PMMG</span></h1>
                </a>
                <a href="index.html" class="px-4 py-2 rounded-lg border-2 border-neon-green text-neon-green font-bold text-sm hover:bg-neon-green hover:text-dark-900 transition">
                    ← Voltar
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="min-h-[calc(100vh-80px)] py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-3xl mx-auto">
            <h2 class="text-4xl font-bold text-neon-green text-center mb-12">Simulado PMMG</h2>

            <div class="bg-dark-800 border border-gray-700 rounded-lg p-6 sm:p-8">
                <div id="quiz-container">
                    <button onclick="carregarPergunta()" class="w-full px-6 py-4 bg-neon-green text-dark-900 rounded-lg font-bold hover:bg-neon-green-light transition text-lg">
                        Iniciar Simulado
                    </button>
                </div>
            </div>

            <!-- Info Box -->
            <div class="mt-8 bg-neon-green bg-opacity-10 border-l-4 border-neon-green p-6 rounded-lg">
                <p class="text-neon-green font-bold mb-2">ℹ️ Informação:</p>
                <p class="text-gray-300">
                    Este simulado contém questões de múltipla escolha sobre português e raciocínio lógico. 
                    Você receberá feedback imediato e poderá acompanhar seu desempenho!
                </p>
            </div>
        </div>
    </main>

    <script src="simulado.js"></script>
    <script>
        // Customize the quiz container styling for dark/neon theme
        const originalCarregarPergunta = window.carregarPergunta;
        window.carregarPergunta = function() {
            originalCarregarPergunta.call(this);
            const container = document.getElementById('quiz-container');
            container.className = 'pergunta';
        };
    </script>

</body>
</html>
