<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ROTA PMMG</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: { 800: '#161d2f', 900: '#0b0f1a' },
                        neon: { green: '#4ade80', green_light: '#22c55e' }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        * { font-family: 'Inter', system-ui, sans-serif; }
        body { background-color: #0b0f1a; color: white; background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><polygon points="50,0 0,100 100,100" fill="rgba(255, 255, 255, 0.015)"/></svg>'); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">

    <div class="w-full max-w-md">
        <!-- Card -->
        <div class="bg-dark-800 border border-gray-700 rounded-lg shadow-2xl p-8">
            
            <!-- Logo -->
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-neon-green rounded-lg flex items-center justify-center text-dark-900 text-3xl mx-auto mb-4 font-bold">
                    📚
                </div>
                <h1 class="text-2xl font-bold text-white">
                    ROTA <span class="text-neon-green">PMMG</span>
                </h1>
            </div>

            <!-- Form -->
            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-bold text-gray-300 mb-2">
                        Seu Nome
                    </label>
                    <input 
                        type="text" 
                        id="username" 
                        required
                        class="w-full px-4 py-3 border-2 border-gray-600 rounded-lg bg-dark-900 text-white focus:border-neon-green focus:outline-none transition placeholder-gray-500"
                        placeholder="Digite seu nome"
                    >
                </div>

                <button 
                    type="submit" 
                    class="w-full bg-neon-green text-dark-900 font-bold py-3 rounded-lg hover:bg-neon-green-light transition text-lg"
                >
                    Entrar na Plataforma
                </button>
            </form>

            <!-- Divider -->
            <div class="my-6 flex items-center">
                <div class="flex-1 border-t border-gray-600"></div>
                <span class="px-3 text-gray-400 text-sm">ou</span>
                <div class="flex-1 border-t border-gray-600"></div>
            </div>

            <!-- Alternative -->
            <a href="index.html" class="block w-full px-4 py-3 border-2 border-neon-green text-neon-green rounded-lg text-center font-bold hover:bg-neon-green hover:text-dark-900 transition">
                Explorar sem Logar
            </a>

            <!-- Footer -->
            <p class="text-center text-gray-400 text-sm mt-6">
                Primeira vez aqui? Crie sua conta estudando! 
                <br>
                <span class="text-neon-green font-bold">Seu progresso será salvo.</span>
            </p>
        </div>

        <!-- Back Button -->
        <div class="text-center mt-6">
            <a href="/" class="text-gray-400 hover:text-neon-green text-sm transition">
                ← Voltar para Home
            </a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('username').value.trim();
            
            if (name) {
                // Salva em localStorage
                localStorage.setItem('usuarioPMMG', name);
                localStorage.setItem('nome', name);
                localStorage.setItem('usuarioLogado', name);
                
                // Redirect to home
                window.location.href = 'index.html';
            }
        });
    </script>

</body>
</html>
