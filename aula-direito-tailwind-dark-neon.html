<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Direito - ROTA PMMG | Legislação e Constituição</title>
    <meta name="description" content="Aulas de Legislação para PMMG: Direito Constitucional, LINDB e leis aplicadas.">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: { 800: '#161d2f', 900: '#0b0f1a' },
                        neon: { green: '#4ade80', green_light: '#22c55e' }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        * { font-family: 'Inter', system-ui, sans-serif; }
        body { background-color: #0b0f1a; color: white; background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><polygon points="50,0 0,100 100,100" fill="rgba(255, 255, 255, 0.015)"/></svg>'); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #161d2f; }
        ::-webkit-scrollbar-thumb { background: #4ade80; border-radius: 4px; }
        .lei-item.active { background: rgba(74, 222, 128, 0.1); border-left: 4px solid #4ade80; color: #4ade80; }
        .lei-item:not(.active) { border-left: 4px solid transparent; }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="sticky top-0 z-40 bg-dark-800 bg-opacity-95 backdrop-blur-lg border-b border-white border-opacity-10 py-5">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center">
                <a href="index.html" class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-neon-green rounded-lg flex items-center justify-center font-bold text-dark-900">📚</div>
                    <h1 class="hidden sm:block text-xl font-bold text-white">ROTA <span class="text-neon-green">PMMG</span></h1>
                </a>
                <div class="flex items-center gap-3">
                    <button id="darkModeToggle" class="p-2 rounded-lg bg-gray-700 hover:bg-gray-600 transition">
                        <span class="text-lg">☀️</span>
                    </button>
                    <a href="index.html" class="hidden sm:block px-4 py-2 rounded-lg border-2 border-neon-green text-neon-green font-bold text-sm hover:bg-neon-green hover:text-dark-900 transition">
                        ← Voltar
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Layout -->
    <div class="flex min-h-screen flex-col lg:flex-row">
        
        <!-- Sidebar -->
        <aside class="hidden lg:flex lg:w-80 bg-dark-800 border-r border-white border-opacity-10 flex-col py-8">
            <div class="px-6 pb-6 border-b border-white border-opacity-10">
                <h3 class="font-bold text-lg text-white">📖 Legislação</h3>
            </div>
            <nav class="flex-1 overflow-y-auto px-4 py-4 space-y-2">
                <button onclick="mudarConteudo('Docs/constituicao.pdf', 'Direito Constitucional', 'V9shT99u_YI')" class="lei-item w-full text-left px-4 py-3 rounded-lg text-gray-300 hover:text-neon-green font-medium text-sm transition active bg-white bg-opacity-5">
                    Direito Constitucional
                </button>
                <button onclick="mudarConteudo('Docs/lindb.pdf', 'LINDB', 'ypNuEbiWysw')" class="lei-item w-full text-left px-4 py-3 rounded-lg text-gray-400 hover:text-neon-green font-medium text-sm transition">
                    LINDB
                </button>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto">
            <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                
                <!-- Mobile topic selector -->
                <div class="lg:hidden mb-6">
                    <select id="mobileLei" class="w-full px-4 py-2 border border-gray-600 rounded-lg bg-dark-800 text-white font-medium" onchange="const vals = this.value.split('|'); mudarConteudo(vals[0], vals[1], vals[2])">
                        <option value="Docs/constituicao.pdf|Direito Constitucional|V9shT99u_YI">Direito Constitucional</option>
                        <option value="Docs/lindb.pdf|LINDB|ypNuEbiWysw">LINDB</option>
                    </select>
                </div>

                <!-- Header com Download -->
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
                    <h2 id="titulo-lei" class="text-4xl font-bold text-neon-green">Direito Constitucional</h2>
                    <a id="link-download" href="Docs/constituicao.pdf" download class="px-6 py-3 bg-neon-green text-dark-900 rounded-lg font-bold hover:bg-neon-green-light transition inline-block">
                        Baixar PDF 📥
                    </a>
                </div>

                <!-- PDF Viewer -->
                <div class="bg-dark-800 border border-gray-700 rounded-lg overflow-hidden mb-8">
                    <iframe 
                        id="pdf-frame" 
                        src="Docs/constituicao.pdf" 
                        class="w-full"
                        style="height: 700px; border: none;">
                    </iframe>
                </div>

                <!-- Video Section -->
                <div class="bg-dark-800 border border-gray-700 rounded-lg overflow-hidden p-6">
                    <h3 class="text-2xl font-bold text-neon-green mb-6">📺 Videoaula de Apoio</h3>
                    <div class="rounded-lg overflow-hidden border border-gray-700">
                        <iframe 
                            id="video-frame"
                            width="100%" 
                            height="400"
                            src="https://www.youtube.com/embed/V9shT99u_YI" 
                            title="Direito Constitucional - Aula PMMG" 
                            frameborder="0" 
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                            allowfullscreen
                            class="aspect-video">
                        </iframe>
                    </div>
                </div>

                <!-- Study Tips -->
                <div class="mt-8 bg-neon-green bg-opacity-10 border-l-4 border-neon-green p-6 rounded-lg">
                    <p class="text-neon-green font-bold mb-2">💡 Dica de Estudo:</p>
                    <p class="text-gray-300">Estude a Constituição Federal e a LINDB em paralelo. Muitos artigos se complementam e facilita a memorização para a prova!</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        function mudarConteudo(caminhoArquivo, titulo, idVideo) {
            const frame = document.getElementById('pdf-frame');
            const video = document.getElementById('video-frame');
            const linkDownload = document.getElementById('link-download');
            const tituloLei = document.getElementById('titulo-lei');
            
            frame.src = caminhoArquivo;
            video.src = "https://www.youtube.com/embed/" + idVideo;
            tituloLei.textContent = titulo;
            linkDownload.href = caminhoArquivo;

            // Update active button
            const itens = document.querySelectorAll('.lei-item');
            itens.forEach(i => i.classList.remove('active'));
            event.currentTarget.classList.add('active');

            // Update mobile select
            const select = document.getElementById('mobileLei');
            if (select) {
                select.value = caminhoArquivo + '|' + titulo + '|' + idVideo;
            }

            // Smooth scroll to top
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Dark mode toggle
        document.getElementById('darkModeToggle').addEventListener('click', () => {
            document.body.style.backgroundColor = document.body.style.backgroundColor === 'rgb(243, 244, 246)' ? '#0b0f1a' : '#f3f4f6';
            document.body.style.color = document.body.style.color === 'white' ? '#111827' : 'white';
            document.getElementById('darkModeToggle').querySelector('span').textContent = 
                document.body.style.backgroundColor === '#0b0f1a' ? '☀️' : '🌙';
        });
    </script>

</body>
</html>
